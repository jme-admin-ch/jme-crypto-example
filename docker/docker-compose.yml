services:

  ############################################
  # Database for local development
  ############################################
  jme-crypto-db-local:
    image: postgres:18.4-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=jme-crypto-db-local

  ############################################
  # Kafka Cluster
  ############################################
  jme-crypto-broker:
    image: confluentinc/cp-kafka:8.3.0
    hostname: jme-crypto-broker
    ports:
      - "10000:10000"
    volumes:
      - ./kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf
    environment:
      # KRaft mode settings
      KAFKA_BROKER_ID: 1
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@jme-crypto-broker:29093'
      # KRaft cluster ID - format properly, a 22-character base64-encoded string, for the confluent platform
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://jme-crypto-broker:9092,SASL_PLAINTEXT://localhost:10000
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,SASL_PLAINTEXT://0.0.0.0:10000,CONTROLLER://0.0.0.0:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Authentication
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf"
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-512
      # Temporary storage settings
      KAFKA_LOG_DIRS: /tmp/kafka-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 10s

  jme-crypto-broker_init:
    image: confluentinc/cp-kafka:8.3.0
    depends_on:
      jme-crypto-broker:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -exc
      - kafka-configs --bootstrap-server jme-crypto-broker:9092 --alter --add-config 'SCRAM-SHA-512=[password=user-secret]' --entity-type users --entity-name user

  jme-crypto-schema-registry:
    image: confluentinc/cp-schema-registry:8.3.0
    depends_on:
      jme-crypto-broker:
        condition: service_healthy
      jme-crypto-broker_init:
        condition: service_completed_successfully
      vault_init:
        condition: service_completed_successfully
      minio_init:
        condition: service_completed_successfully
    ports:
      - "11000:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: jme-crypto-schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://jme-crypto-broker:9092

  ############################################
  # S3 Object Storage
  ############################################
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    hostname: minio
    tmpfs:
      - /data
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: local
      MINIO_ROOT_PASSWORD: localsecret
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5
    command: server /data

  minio_init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: minio
    entrypoint:
      - /bin/sh
      - -exc
      - |
        mc alias set minio http://minio:9000 local localsecret
        mc mb --ignore-existing minio/jme-processcontext-obs
        mc ls minio/jme-processcontext-obs

  ############################################
  # HashiCorp Vault (JWE key management)
  ############################################

  vault:
    image: hashicorp/vault:2.0.3
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: secret
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: [ "CMD", "vault", "status", "-address=http://127.0.0.1:8200" ]
      interval: 2s
      timeout: 5s
      retries: 30

  vault_init:
    image: hashicorp/vault:2.0.3
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "secret"
      # Bypass the corporate proxy injected by the CI docker daemon, otherwise the
      # vault CLI cannot reach http://vault:8200 (proxy answers 504 DNS look up failed)
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: vault
    volumes:
      - ./vault-test-config.sh:/vault-test-config.sh
      - ./jme-crypto-service-vault-pol.hcl:/jme-crypto-service-vault-pol.hcl
    command: '/bin/sh /vault-test-config.sh'
