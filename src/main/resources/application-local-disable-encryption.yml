spring:
  cloud:
    vault:
      enabled: false
  config:
    import: classpath:crypto-vault-config.yml
  datasource:
    url: "jdbc:postgresql://localhost:5432/jme-crypto-db-local"
    username: postgres
    password: secret

jme:
  crypto:
    objectstorage:
      connection:
        access-url: http://localhost:9000
        access-key: local
        secret-key: localsecret
jeap:
  messaging:
    kafka:
      bootstrapServers: "http://localhost:10000"
      schemaRegistryUrl: "http://localhost:11000"
      username: user
      password: user-secret
      securityProtocol: SASL_PLAINTEXT
      set-compatibility-mode-none: true
  vault:
    url: http://localhost:8200
    authentication: TOKEN
    app-role:
      role-id: dummy
      secret-id: dummy
  crypto:
    disabledForTestEnv: true
